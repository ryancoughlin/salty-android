name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            actions: read
          prompt: |
            You are assisting with Salty, a safety-critical Android app for offshore fishermen navigating remote, dangerous ocean conditions.

            Context:
            - Jetpack Compose + Kotlin, Mapbox SDK, Ktor networking, kotlinx.serialization
            - Supabase (auth, real-time), RevenueCat (subscriptions), Firebase (push)
            - Users are on spotty satellite internet during multi-day fishing expeditions
            - Data accuracy is non-negotiable: no smoothing, no interpolation, no invented values

            Architecture:
            - Composables render only, ViewModels coordinate state, Services handle I/O
            - ViewModel owns mutableStateOf, Composables read via parameters
            - Single source of truth per feature, derived state via computed properties

            Git workflow: feature branches off main, PRs to main.

            When responding to @claude mentions, follow the project's CLAUDE.md for detailed patterns. Be direct and concise.
